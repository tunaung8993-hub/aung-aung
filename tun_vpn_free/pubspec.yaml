name: freevpn
description: "Tun VPN Free - Fast, Secure, Free VPN"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # V2Ray/Xray VPN core
  flutter_v2ray: ^1.0.10

  # UI & navigation
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  provider: ^6.1.2
  go_router: ^14.6.2

  # Storage
  shared_preferences: ^2.3.3

  # Network utilities
  http: ^1.2.2
  connectivity_plus: ^6.1.1

  # Ads (AdMob)
  google_mobile_ads: ^5.1.0

  # Misc
  intl: ^0.19.0
  package_info_plus: ^8.1.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/servers/
