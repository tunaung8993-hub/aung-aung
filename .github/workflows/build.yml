name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        working-directory: tun_vpn_free
        run: flutter pub get

      - name: Fix Gradle and Jetifier
        working-directory: tun_vpn_free
        run: |
          sed -i 's/distributionUrl=.*/distributionUrl=https\:\/\/services.gradle.org\/distributions\/gradle-8.4-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          if grep -q "android.enableJetifier" android/gradle.properties; then
            sed -i 's/android.enableJetifier=true/android.enableJetifier=false/g' android/gradle.properties
          else
            echo "android.enableJetifier=false" >> android/gradle.properties
          fi

      - name: Build APK
        working-directory: tun_vpn_free
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TunVPN-APK
          path: tun_vpn_free/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
