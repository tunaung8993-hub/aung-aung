name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Install dependencies
        run: flutter pub get
        working-directory: tun_vpn_free

      - name: Build APK
        run: flutter build apk --release
        working-directory: tun_vpn_free

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: tun_vpn_free/build/app/outputs/flutter-apk/app-release.apk
